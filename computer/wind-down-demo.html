  <title>Sleep Tight · Tonight</title>
  <style>
    :root{color-scheme:dark;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;--ink:#fff9f1;--muted:#a89f97;--faint:#756e69;--amber:#ffad68;--mint:#9ed6ba;--lamp-rgb:255,146,76;--lamp-level:.24}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#08090b}body{min-width:320px;color:var(--ink)}button,select{font:inherit;color:inherit}.scene{position:relative;min-height:100svh;overflow:hidden;background:radial-gradient(circle at 50% 39%,rgba(var(--lamp-rgb),calc(var(--lamp-level)*.44)),transparent min(42vw,600px)),linear-gradient(155deg,#181317 0%,#09090c 58%,#060709 100%);transition:background .4s linear}.grain{position:absolute;inset:0;pointer-events:none;opacity:.12;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.82' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.18'/%3E%3C/svg%3E")}.top{position:absolute;z-index:5;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:26px clamp(22px,4vw,56px)}.brand{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:780}.brand i{width:9px;height:9px;border-radius:50%;background:var(--amber);box-shadow:0 0 18px var(--amber)}.wall{text-align:right}.wall span{display:block;color:var(--faint);font-size:9px;font-weight:800;letter-spacing:.16em;text-transform:uppercase}.wall strong{font-size:13px;font-weight:650;font-variant-numeric:tabular-nums}.demo-time{position:absolute;z-index:3;top:13%;left:50%;transform:translateX(-50%);text-align:center;white-space:nowrap}.demo-time .phase{color:var(--amber);font-size:10px;font-weight:850;letter-spacing:.17em;text-transform:uppercase}.demo-time time{display:block;margin-top:6px;font-size:clamp(56px,8vw,104px);font-weight:420;line-height:.9;letter-spacing:-.075em;font-variant-numeric:tabular-nums}.demo-time p{margin:10px 0 0;color:var(--muted);font-size:13px}.lamp{position:absolute;z-index:2;left:50%;bottom:5%;width:min(520px,72vw);height:min(610px,65vh);transform:translateX(-50%)}.glow{position:absolute;left:50%;t p;overflow-wrap:anywhere}.sound{position:absolute;z-index:6;right:clamp(22px,4vw,56px);bottom:clamp(24px,4vw,48px);display:flex;align-items:end;gap:14px;text-align:right}.sound-copy span{display:block;color:var(--faint);font-size:9px;font-weight:850;letter-spacing:.14em;text-transform:uppercase}.sound-select{min-height:30px;max-width:220px;padding:0 2px;border:0;color:#d9d0c8;background:transparent;font-size:11px;text-align:right;cursor:pointer}.sound-state{display:flex;align-items:center;justify-content:end;gap:7px;color:var(--faint);font-size:10px}.signal-dot{width:7px;height:7px;border-radius:50%;background:#706b68}.sound-state.live{color:var(--mint)}.sound-state.live .signal-dot{background:var(--mint);box-shadow:0 0 12px var(--mint)}.bars{display:flex;align-items:end;gap:3px;width:34px;height:30px}.bars i{width:3px;height:5px;border-radius:3px;background:var(--faint);transition:height .12s linear}.sound-state.live+.bars i{background:var(--mint)}.sound-button{min-width:48px;height:48px;border:1px solid rgba(255,255,255,.13);border-radius:50%;background:rgba(255,255,255,.05);cursor:pointer}.sound-button:hover{background:rgba(255,255,255,.11)}.unlock{position:absolute;z-index:8;left:50%;bottom:17%;transform:translateX(-50%);min-height:46px;padding:0 18px;border:1px solid rgba(255,255,255,.18);border-radius:999px;color:#21150e;background:var(--amber);font-weight:780;cursor:pointer;box-shadow:0 12px 30px rgba(0,0,0,.28)}.unlock[hidden]{display:none}.scope{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}
    @media(max-width:720px){.demo-time{top:15%}.lamp{bottom:14%;width:min(500px,94vw);height:54vh}.meta{bottom:24px;max-width:58%}.meta p{display:none}.sound{right:20px;bottom:24px}.sound-select{max-width:135px}.meta-line{display:none}.json{display:none}.wall strong{font-size:11px}}
    @media(max-width:430px){.top{padding:20px}.demo-time time{font-size:64px}.lamp{bottom:17%;height:48vh}.meta{left:20px}.meta h1{font-size:15px}.sound{right:18px}.sound-copy{display:none}.unlock{bottom:13%}}
    @media(prefers-reduced-motion:reduce){.bars i{transition:none}}
  </style>
</head>
<body>
  <main class="scene">
    <div class="grain"></div>
    <header class="top"><div class="brand"><i></i>Sleep Tight</div><div class="wall"><span>Local wall clock</span><strong id="wallClock">--:--:--</strong></div></header>
    <div class="demo-time"><div class="phase" id="phase">Wind-down running</div><time id="demoClock">22:05</time><p id="state">Fading gently toward sleep</p></div>
    <div class="lamp" role="img" aria-label="A warm bedside lamp fading toward darkness"><div class="glow"></div><div class="shade"></div><div class="bulb"></div><div class="stem"></div><div class="base"></div></div>
    <section class="meta" aria-label="Plan metadata"><div class="label" id="planLabel">Personal plan · loading</div><h1 id="planName">Warm amber descent</h1><p id="planDescription">Loading the latest immutable room command from this Mac.</p><div class="meta-line"><span>Light <strong id="lightMeta">23%</strong></span><span>Sound <strong id="soundMeta">8%</strong></span><span>Lights out <strong id="lightsOutMeta">--:--</strong></span></div><details class="json"><summary>View JSON command</summary><pre id="jsonView">Loading…</pre></details></section>
    <section class="sound" aria-label="Sound status"><div class="sound-copy"><span>Background sound</span><select class="sound-select" id="profile" aria-label="Background sound"><option value="instrumental">Low-arousal instrumental · 68 BPM</option><option value="pink">Pink masking noise</option><option value="brown">Brown masking noise</option><option value="ocean">Synthetic ocean wash</option><option value="silence">Silence</option></select><div class="sound-state" id="soundState" data-signal="absent"><i class="signal-dot"></i><span id="soundStatus">Starting…</span></div></div><div class="bars" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i></div><button class="sound-button" id="toggleSound" aria-label="Pause sound">Ⅱ</button></section>
    <button class="unlock" id="unlock" hidden>Tap for sound</button>
    <canvas class="scope" id="scope" width="64" height="32" aria-hidden="true"></canvas>
  </main>
  <script>
    const FALLBACK={data_status:'synthetic_demo',generated_by:'Demo fallback',generated_at:'2026-07-18T22:05:08+08:00',schedule:{wind_down_start:'22:05',demo_refresh_start:'22:05',demo_minutes_per_second:1,lights_out:'22:35',duration_minutes:30},light:{profile:'warm_amber_fade',start_rgb:[255,169,92],end_rgb:[255,104,58],start_percent:32,end_percent:0,curve:'ease_out'},sound:{profile:'low_arousal_instrumental',tempo_bpm:64,start_percent:16,end_percent:0,fade_minutes:30,stop_at_lights_out:true}};
    const $=s=>document.querySelector(s);let command=FALLBACK,demoMinute=0,baseClockMinutes=22*60+5,lastFrame=performance.now(),ctx,master,analyser,compressor,sources=[],musicTimer,audioWanted=true,audioStarted=false;
    function clamp(v,a=0,b=1){return Math.max(a,Math.min(b,v))}function mix(a,b,p){return Math.round(a+(b-a)*p)}function timeText(minute){const total=(baseClockMinutes+Math.floor(minute))%(24*60);return `${String(Math.floor(total/60)).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`}
    async function loadCommand(){let fallback=false;try{const runId=new URLSearchParams(location.search).get('run_id'),url=runId?`/api/v1/room-command?run_id=${encodeURIComponent(runId)}`:'/api/v1/room-command/latest',response=await fetch(url,{cache:'no-store'});if(!response.ok)throw new Error();command=await response.json()}catch(_){command=FALLBACK;fallback=true}const start=command.schedule.wind_down_start||'22:05',parts=start.split(':').map(Number);baseClockMinutes=parts[0]*60+parts[1];demoMinute=0;const soundProfile=command.sound.profile;$('#profile').value=soundProfile==='silence'?'silence':soundProfile==='pink_noise'?'pink':soundProfile==='brown_noise'?'brown':soundProfile==='ocean'?'ocean':'instrumental';if($('#profile').value==='instrumental')$('#profile').options[0].textContent=`Low-arousal instrumental · ${command.sound.tempo_bpm||64} BPM`;audioWanted=$('#profile').value!=='silence';$('#planLabel').textContent=fallback?'Synthetic fallback':command.generated_by==='Codex constrained decision'?'Codex plan · validated and immutable':'Personal plan · immutable';$('#planDescription').textContent=command.warning||`${command.plan?.profile_label||'Safety-bounded wind-down'}. ${command.plan?.selection_reason||'Light and sound end together.'}`;$('#lightsOutMeta').textContent=command.schedule.lights_out;$('#jsonView').textContent=JSON.stringify(command,null,2);update();attemptAutoplay()}
    function update(){const duration=command.schedule.duration_minutes,p=clamp(demoMinute/duration),lightFade=Math.pow(1-p,2.05),soundDuration=Math.max(1,command.sound.fade_minutes||duration),soundStart=Math.max(0,duration-soundDuration),soundP=clamp((demoMinute-soundStart)/soundDuration),soundFade=Math.pow(1-soundP,1.35),light=command.light.start_percent*lightFade,sound=command.sound.start_percent*soundFade,rgb=command.light.start_rgb.map((v,i)=>mix(v,command.light.end_rgb[i],p));document.documentElement.style.setProperty('--lamp-rgb',rgb.join(','));document.documentElement.style.setProperty('--lamp-level',(light/100).toFixed(4));$('#demoClock').textContent=timeText(demoMinute);$('#lightMeta').textContent=`${Math.round(light)}%`;$('#soundMeta').textContent=$('#profile').value==='silence'?'0%':`${Math.round(sound)}%`;if(master&&ctx)master.gain.setTargetAtTime(audioWanted&&$('#profile').value!=='silence'?Math.max(.0001,sound/100):.0001,ctx.currentTime,.18);if(p>=1){$('#phase').textContent='Plan complete';$('#state').textContent='Darkness and silence';$('#planName').textContent='Sleep window';audioWanted=false}else{$('#phase').textContent='Wind-down running';$('#state').textContent='Fading gently toward sleep';$('#planName').textContent='Warm amber descent'}}
    function animate(now){const elapsed=Math.min(100,now-lastFrame),duration=command.schedule.duration_minutes||45;lastFrame=now;if(demoMinute<duration)demoMinute=Math.min(duration,demoMinute+elapsed/1000*(command.schedule.demo_minutes_per_second||1));update();requestAnimationFrame(animate)}
    function updateWall(){const now=new Date();$('#wallClock').textContent=now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})}setInterval(updateWall,1000);updateWall();
    function stopNodes(){clearInterval(musicTimer);sources.forEach(n=>{try{n.stop()}catch(_){}});sources=[]}
    function noiseBuffer(type){const buffer=ctx.createBuffer(1,ctx.sampleRate*3,ctx.sampleRate),data=buffer.getChannelData(0);let brown=0,b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;for(let i=0;i<data.length;i++){const white=Math.random()*2-1;if(type==='brown'||type==='ocean'){brown=(brown+.02*white)/1.02;data[i]=brown*3.5}else{b0=.99886*b0+white*.0555179;b1=.99332*b1+white*.0750759;b2=.969*b2+white*.153852;b3=.8665*b3+white*.3104856;b4=.55*b4+white*.5329522;b5=-.7616*b5-white*.016898;data[i]=(b0+b1+b2+b3+b4+b5+b6+white*.5362)*.11;b6=white*.115926}}return buffer}
    function makeNoise(type){const source=ctx.createBufferSource(),filter=ctx.createBiquadFilter(),gain=ctx.createGain();source.buffer=noiseBuffer(type);source.loop=true;filter.type='lowpass';filter.frequency.value=type==='ocean'?760:2600;gain.gain.value=type==='ocean'?.5:.3;source.connect(filter).connect(gain).connect(compressor);source.start();sources.push(source);if(type==='ocean'){const lfo=ctx.createOscillator(),depth=ctx.createGain();lfo.frequency.value=.075;depth.gain.value=.16;lfo.connect(depth).connect(gain.gain);lfo.start();sources.push(lfo)}}
    function makeMusic(){const chords=[[130.81,164.81,196],[110,130.81,164.81],[87.31,130.81,174.61],[98,146.83,196]],voices=[];chords[0].forEach((f,i)=>{const osc=ctx.createOscillator(),gain=ctx.createGain();osc.type=i===1?'sine':'triangle';osc.frequency.value=f;gain.gain.value=i===0?.11:.075;osc.connect(gain).connect(compressor);osc.start();sources.push(osc);voices.push(osc)});let index=0;musicTimer=setInterval(()=>{index=(index+1)%chords.length;voices.forEach((osc,i)=>osc.frequency.exponentialRampToValueAtTime(chords[index][i],ctx.currentTime+2.4))},Math.round(60000/68*4))}
    async function prepareAudio(){if(!ctx){ctx=new AudioContext();master=ctx.createGain();compressor=ctx.createDynamicsCompressor();analyser=ctx.createAnalyser();analyser.fftSize=512;compressor.connect(master);master.connect(analyser);analyser.connect(ctx.destination);watchSignal()}stopNodes();const type=$('#profile').value;if(type==='instrumental')makeMusic();if(['pink','brown','ocean'].includes(type))makeNoise(type);audioStarted=true;update();await ctx.resume();return ctx.state==='running'}
    async function attemptAutoplay(){audioWanted=$('#profile').value!=='silence';const running=await prepareAudio();$('#unlock').hidden=running||!audioWanted;if(!audioWanted){$('#soundStatus').textContent='Silence selected';$('#toggleSound').textContent='▶'}else if(!running){$('#soundStatus').textContent='Autoplay blocked';$('#toggleSound').textContent='▶';$('#toggleSound').setAttribute('aria-label','Play sound')}}
    async function unlockAudio(){audioWanted=true;if(!audioStarted)await prepareAudio();await ctx.resume();$('#unlock').hidden=true;$('#toggleSound').textContent='Ⅱ';$('#toggleSound').setAttribute('aria-label','Pause sound');update()}
    function watchSignal(){const data=new Uint8Array(analyser.fftSize),bars=[...document.querySelectorAll('.bars i')];function read(){analyser.getByteTimeDomainData(data);let sum=0;for(const v of data){const s=(v-128)/128;sum+=s*s}const rms=Math.sqrt(sum/data.length),present=rms>.001&&audioWanted&&$('#profile').value!=='silence';$('#soundState').classList.toggle('live',present);$('#soundState').dataset.signal=present?'present':'absent';$('#soundStatus').textContent=present?'Sound playing':audioWanted?'Waiting for audio':'Paused';bars.forEach((bar,i)=>bar.style.height=`${5+(present?Math.max(2,Math.abs(data[i*7]-128)*.42):0)}px`);requestAnimationFrame(read)}read()}
    $('#unlock').addEventListener('click',unlockAudio);$('#toggleSound').addEventListener('click',async()=>{if(!ctx||ctx.state!=='running'||!audioWanted){await unlockAudio()}else{audioWanted=false;update();$('#toggleSound').textContent='▶';$('#toggleSound').setAttribute('aria-label','Play sound')}});$('#profile').addEventListener('change',async()=>{audioWanted=$('#profile').value!=='silence';await prepareAudio();if(ctx.state!=='running'&&audioWanted)$('#unlock').hidden=false;update()});window.addEventListener('pointerdown',()=>{if(ctx?.state==='suspended'&&audioWanted)unlockAudio()},{once:true});loadCommand();update();requestAnimationFrame(animate);
  </script>
</body>
